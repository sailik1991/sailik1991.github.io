<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sailik Sengupta</title>
  <meta name="author" content="Sailik Sengupta">
  <meta name="description" content="Senior Scientist in Amazon specializing in LLMs, alignment, and planning.">
  <meta property="og:image" content="https://sailik1991.github.io/images/sailik_shot.jpg">
  <meta property="og:title" content="Sailik Sengupta">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <div id="tweaks-root"></div>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: oklch(48% 0.14 195);
      --teal-light: oklch(96% 0.03 195);
      --teal-mid: oklch(90% 0.06 195);
      --text: #0f1923;
      --text-secondary: #5a6678;
      --text-muted: #8a96a8;
      --border: #d8dde6;
      --bg: #f7f8fa;
      --white: #ffffff;
      --sans: 'DM Sans', system-ui, sans-serif;
      --serif: 'Newsreader', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page shell ── */
    #page-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Header ── */
    #page-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 40px;
      padding: 52px 0 36px;
      border-bottom: 1.5px solid var(--border);
    }

    #header-left {}

    #name-display {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(42px, 5.5vw, 68px);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }

    #role-display {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-muted);
      font-style: normal;
      font-family: var(--sans);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    #header-links {
      display: flex;
      gap: 20px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    #header-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--teal);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }

    #header-links a:hover { opacity: 0.7; }

    #header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
    }

    #portrait {
      width: 120px;
      height: 120px;
      border-radius: 6px;
      object-fit: cover;
      object-position: center top;
      border: 1.5px solid var(--border);
      display: block;
    }

    #portrait-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 6px;
      background: var(--teal-light);
      border: 1.5px solid var(--teal-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      text-align: center;
    }

    #portrait-caption {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      font-family: var(--sans);
      text-align: right;
      max-width: 160px;
      line-height: 1.5;
    }

    #portrait-caption a { color: var(--teal); text-decoration: none; border-bottom: 1px solid var(--teal-mid); }

    /* ── Body grid ── */
    #page-body {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 0;
      align-items: start;
    }

    /* ── Bio (inside main column, above research) ── */
    #bio-wrap {
      padding: 36px 60px 20px 0;
    }

    #bio {
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.85;
      font-weight: 300;
      color: var(--text);
      max-width: 680px;
      padding-bottom: 36px;
    }

    #bio p { margin-bottom: 1em; }
    #bio p:last-child { margin-bottom: 0; }
    #bio a { color: var(--teal); text-decoration: none; border-bottom: 1px solid var(--teal-mid); }
    #bio a:hover { opacity: 0.75; }

    /* ── Main col (Bio + Research) ── */
    #main-col {
      padding: 0 60px 60px 0;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    /* ── Side col ── */
    #side-col {
      padding: 40px 0 60px 40px;
      position: sticky;
      top: 40px;
      align-self: start;
    }

    /* ── Section headers ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Research papers ── */
    #main-col ul {
      list-style: none;
    }

    #main-col ul > li {
      padding: 0 0 24px 16px;
      margin-bottom: 24px;
      border-left: 2px solid var(--teal-light);
      border-bottom: 1px solid var(--border);
      transition: border-left-color 0.2s;
    }

    #main-col ul > li:hover {
      border-left-color: var(--teal);
    }

    #main-col ul > li:last-child {
      border-bottom: none;
    }

    /* Paper title = bold text */
    #main-col ul > li > p > strong:first-child,
    #main-col ul > li > strong:first-child {
      display: block;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 4px;
    }

    /* Paper authors/venue = em text */
    #main-col ul > li em {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Venue text (plain text after <br>, before buttons) */
    #main-col ul > li > p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-top: 3px;
    }

    /* ── Button / link styling (override Bootstrap classes) ── */
    a > button, button.btn { all: unset; }

    /* All links containing buttons */
    #main-col a, #side-col a, #bio a {
      transition: opacity 0.15s;
    }

    /* Inline text links within paper items (e.g. "also demoed at AAAI") */
    #main-col ul > li p a {
      font-size: 12px;
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--teal-mid);
      white-space: nowrap;
    }
    #main-col ul > li p a:hover { opacity: 0.7; }

    /* Venue badge: detect venue-only <a> by class */
    .venue-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--teal);
      background: var(--teal-light);
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.04em;
      margin-right: 4px;
      font-family: var(--sans);
    }

    /* Featured / highlight links (btn-warning) */
    a:has(button.btn-warning) {
      font-size: 12px;
      font-weight: 500;
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--teal);
      padding-bottom: 1px;
      margin-right: 10px;
      display: inline-block;
      margin-top: 6px;
    }

    a:has(button.btn-warning):hover { opacity: 0.7; }

    a:has(button.btn-warning) button::before { content: "↗ "; }

    /* Regular paper/poster/code links (btn-outline-primary, btn-outline-secondary) */
    a:has(button.btn-outline-primary),
    a:has(button.btn-outline-secondary) {
      display: inline-block;
      margin-top: 6px;
      margin-right: 8px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-secondary);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 7px;
      background: var(--white);
      transition: border-color 0.15s, color 0.15s;
    }

    a:has(button.btn-outline-primary):hover,
    a:has(button.btn-outline-secondary):hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* Link rows */
    .paper-links {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2px;
    }

    /* ── Sidebar: Recognition ── */
    .side-section { margin-bottom: 40px; }

    #side-col ul {
      list-style: none;
    }

    .side-section ul > li {
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.45;
    }

    .side-section ul > li strong {
      display: block;
      font-weight: 500;
      color: var(--text);
    }

    .side-section ul > li em {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Talks inherit .side-section li spacing; just tighten the slides link */
    #talks-section ul > li a:has(button) {
      margin-top: 4px;
    }

    /* Talk venue — matches award sub-line style */
    .talk-venue {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 2px;
    }
    .talk-venue em { font-style: italic; }

    /* ── Loading state ── */
    #loading {
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 14px;
      font-family: var(--mono);
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      #page-wrap { padding: 0 20px; }
      #page-header { grid-template-columns: 1fr; }
      #header-right { align-items: flex-start; flex-direction: row; }
      #page-body { grid-template-columns: 1fr; }
      #bio-wrap { grid-column: 1; }
      #main-col { padding-right: 0; border-right: none; border-bottom: 1px solid var(--border); }
      #side-col { padding-left: 0; }
    }
  </style>
</head>
<body>
<div id="page-wrap">

  <!-- Header -->
  <header id="page-header">
    <div id="header-left">
      <div id="name-display">Sailik Sengupta</div>
      <div id="role-display">Senior Scientist · AWS AI Labs · LLM Alignment &amp; Decoding</div>
      <nav id="header-links">
        <a href="./files/CV_sailiks.pdf">Curriculum Vitae</a>
        <a href="https://scholar.google.com/citations?user=Hlm-ti8AAAAJ&hl=en&oi=ao">Google Scholar</a>
        <a href="https://github.com/sailik1991">GitHub</a>
        <a href="https://in.linkedin.com/in/sailiks">LinkedIn</a>
        <a href="https://twitter.com/sailiks">Twitter / X</a>
        <a href="https://instagram.com/guy.on.the.learning.curve/">Instagram</a>
      </nav>
    </div>
    <div id="header-right">
      <img id="portrait"
           src="./images/sailik_feluda_deepart.jpg"
           alt="Sailik Sengupta"
           onerror="this.style.display='none'; document.getElementById('portrait-placeholder').style.display='flex';">
      <div id="portrait-placeholder" style="display:none;">portrait</div>
      <div id="portrait-caption">
        Style-transferring a <a href="https://en.wikipedia.org/wiki/Feluda">Feluda</a> cover onto his portrait at the <a href="https://en.wikipedia.org/wiki/Golden_Gate_Bridge">Golden Gate Bridge</a>.
      </div>
    </div>
  </header>

  <!-- Two-column body -->
  <div id="page-body">
    <main id="main-col">
      <div id="bio-wrap">
        <div id="bio"><div id="loading">Loading…</div></div>
      </div>
    </main>
    <aside id="side-col"></aside>
  </div>

</div><!-- /page-wrap -->

<script>
(function () {
  const FEATURED_CLASSES = ['btn-warning'];

  function makeLabel(text) {
    const d = document.createElement('div');
    d.className = 'section-label';
    d.textContent = text;
    return d;
  }

  function wrapLinks(container) {
    // Only move <a> elements that wrap a <button> into .paper-links
    // Plain text <a> links (e.g. "also demoed at AAAI") stay inline
    container.querySelectorAll('li').forEach(li => {
      const btnLinks = [...li.querySelectorAll('a')].filter(a => a.querySelector('button'));
      if (!btnLinks.length) return;
      const wrap = document.createElement('div');
      wrap.className = 'paper-links';
      btnLinks.forEach(a => {
        a.remove();
        wrap.appendChild(a);
      });
      li.appendChild(wrap);
    });
  }

  function extractVenueBadge(li) {
    const venuePattern = /^(ACL|EMNLP|NAACL|ICLR|NeurIPS|ICML|AAAI|AAMAS|ICAPS|GameSec|KDD|HICSS|RSS|IEEE|HCI Journal|Artificial Intelligence Journal|WeCNLP|SoCS|EACL|ReTIS|Naturalistic Decision Making|Ph\.D\. Thesis)/i;
    // Showdown renders li content as one <p> with <br> separators.
    // Venue text is a raw text node immediately after a <br>.
    li.querySelectorAll('br').forEach(br => {
      let node = br.nextSibling;
      // Skip empty text nodes
      while (node && node.nodeType === 3 && node.textContent.trim() === '') {
        node = node.nextSibling;
      }
      if (!node || node.nodeType !== 3) return;
      const text = node.textContent.trim();
      if (!venuePattern.test(text)) return;
      // Split "ACL, 2025" into badge + year
      const commaIdx = text.indexOf(',');
      const venue = commaIdx > -1 ? text.slice(0, commaIdx).trim() : text;
      const rest = commaIdx > -1 ? text.slice(commaIdx + 1).trim() : '';
      // Replace the text node with badge + rest
      const badge = document.createElement('span');
      badge.className = 'venue-badge';
      badge.textContent = venue;
      const restNode = document.createTextNode(rest ? ' ' + rest : '');
      node.parentNode.insertBefore(badge, node);
      node.parentNode.insertBefore(restNode, node);
      node.remove();
    });
  }

  fetch('page.md')
    .then(r => r.text())
    .then(md => {
      const converter = new showdown.Converter({
        tables: true,
        ghCodeBlocks: true,
        literalMidWordUnderscores: true
      });
      const html = converter.makeHtml(md);

      const tmp = document.createElement('div');
      tmp.innerHTML = html;

      // 1. Extract name from H1
      const h1 = tmp.querySelector('h1');
      if (h1) {
        document.getElementById('name-display').textContent = h1.textContent.trim();
        h1.remove();
      }

      // 2. Extract bio paragraphs (everything before first h4) — snapshot first
      const firstH4 = tmp.querySelector('h4');
      const bioEl = document.getElementById('bio');
      bioEl.innerHTML = '';
      if (firstH4) {
        const bioNodes = [];
        let node = tmp.firstElementChild;
        while (node && node !== firstH4) {
          bioNodes.push(node);
          node = node.nextElementSibling;
        }
        bioNodes.forEach(n => bioEl.appendChild(n));
      }

      // 3. Collect sections by h4 text — snapshot ul before removing h4
      const sections = {};
      tmp.querySelectorAll('h4').forEach(h4 => {
        const raw = h4.textContent.trim();
        const title = raw.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[\u2600-\u27BF]/g, '').trim();
        const ul = h4.nextElementSibling;
        sections[title] = ul;
      });
      // Remove h4 elements after collecting (don't mutate during querySelectorAll)
      tmp.querySelectorAll('h4').forEach(h4 => h4.remove());

      // 4. Build sidebar
      const sideEl = document.getElementById('side-col');

      ['Recognition', 'Invited Talks'].forEach(key => {
        const ul = sections[key];
        if (!ul) return;
        // Strip leading ", " text nodes after display:block <strong>
        ul.querySelectorAll('li').forEach(li => {
          (li.querySelectorAll('p').length ? li.querySelectorAll('p') : [li]).forEach(p => {
            p.childNodes.forEach(node => {
              if (node.nodeType === 3 && /^\s*,\s*$/.test(node.textContent)) node.remove();
            });
          });
        });
        // For Invited Talks: wrap venue line (text after first <br>) in .talk-venue span
        // then remove all remaining <br> tags so spacing matches Recognition
        if (key === 'Invited Talks') {
          ul.querySelectorAll('li').forEach(li => {
            const brs = [...li.querySelectorAll('br')];
            if (!brs.length) return;
            const firstBr = brs[0];
            // Collect consecutive non-<br>, non-button siblings after firstBr as venue
            const venueNodes = [];
            let n = firstBr.nextSibling;
            while (n && !(n.nodeName === 'BR') && !(n.nodeName === 'A' && n.querySelector('button'))) {
              venueNodes.push(n);
              n = n.nextSibling;
            }
            if (venueNodes.length) {
              const span = document.createElement('span');
              span.className = 'talk-venue';
              firstBr.parentNode.insertBefore(span, venueNodes[0]);
              venueNodes.forEach(vn => span.appendChild(vn));
            }
            // Remove all <br> tags from this li
            li.querySelectorAll('br').forEach(br => br.remove());
          });
        }
        const wrap = document.createElement('div');
        wrap.className = 'side-section';
        if (key === 'Invited Talks') wrap.id = 'talks-section';
        wrap.appendChild(makeLabel(key));
        wrapLinks(ul);
        wrap.appendChild(ul);
        sideEl.appendChild(wrap);
      });

      // 5. Build main col (Research)
      const mainEl = document.getElementById('main-col');
      const researchUl = sections['Research'];
      if (researchUl) {
        mainEl.appendChild(makeLabel('Research'));
        researchUl.querySelectorAll('li').forEach(li => extractVenueBadge(li));
        wrapLinks(researchUl);
        mainEl.appendChild(researchUl);
      }
    })
    .catch(err => {
      document.getElementById('bio').innerHTML = '<p style="color:#e55">Could not load page.md — ' + err.message + '</p>';
      console.error(err);
    });
})();
</script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "oklch(48% 0.14 195)",
  "sidebarWidth": 280,
  "bioSize": 16,
  "nameSize": 60
}/*EDITMODE-END*/;

function TweaksApp() {
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--teal', tweaks.accentColor);
    root.style.setProperty('--teal-light', tweaks.accentColor.replace('48%', '96%').replace('0.14', '0.03'));
    root.style.setProperty('--teal-mid', tweaks.accentColor.replace('48%', '90%').replace('0.14', '0.06'));
    document.getElementById('side-col').style.width = tweaks.sidebarWidth + 'px';
    document.getElementById('side-col').style.minWidth = tweaks.sidebarWidth + 'px';
    document.getElementById('bio').style.fontSize = tweaks.bioSize + 'px';
    document.getElementById('name-display').style.fontSize = tweaks.nameSize + 'px';
  }, [tweaks]);

  return (
    <TweaksPanel>
      <TweakColor id="accentColor" title="Accent color" tweaks={tweaks} setTweaks={setTweaks} />
      <TweakSlider id="nameSize" title="Name size" min={36} max={80} step={1} tweaks={tweaks} setTweaks={setTweaks} />
      <TweakSlider id="bioSize" title="Bio font size" min={13} max={20} step={1} tweaks={tweaks} setTweaks={setTweaks} />
      <TweakSlider id="sidebarWidth" title="Sidebar width" min={200} max={380} step={10} tweaks={tweaks} setTweaks={setTweaks} />
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);
</script>
</body>
</html>
